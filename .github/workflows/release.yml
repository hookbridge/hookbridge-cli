name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./... -count=1 -timeout=120s

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          LDFLAGS="-s -w -X main.Version=${VERSION}"

          targets=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )

          mkdir -p dist

          for target in "${targets[@]}"; do
            GOOS="${target%%/*}"
            GOARCH="${target##*/}"
            output="hb"
            if [ "$GOOS" = "windows" ]; then
              output="hb.exe"
            fi

            echo "Building ${GOOS}/${GOARCH}..."
            GOOS=$GOOS GOARCH=$GOARCH go build -ldflags "$LDFLAGS" -o "dist/${output}" ./cmd/hb/

            archive="hb_${VERSION}_${GOOS}_${GOARCH}"
            if [ "$GOOS" = "windows" ]; then
              (cd dist && zip "${archive}.zip" "${output}")
            else
              tar -czf "dist/${archive}.tar.gz" -C dist "${output}"
            fi
            rm "dist/${output}"
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
